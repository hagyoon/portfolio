name: Sync Obsidian content

on:
  repository_dispatch:
    types: [obsidian-push]
  schedule:
    - cron: "*/30 * * * *"   # fallback poll every 30 min
  workflow_dispatch:           # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Checkout obsidian-secondbrain
        uses: actions/checkout@v4
        with:
          repository: hagyoon/obsidian-secondbrain
          token: ${{ secrets.GH_PAT }}
          path: _obsidian

      - name: Sync Portfolio/content → content/
        run: |
          if [ -d "_obsidian/Portfolio/content" ]; then
            rsync -av --delete _obsidian/Portfolio/content/ content/
            echo "Synced from Portfolio/content"
          else
            echo "No Portfolio/content folder found in obsidian-secondbrain — skipping."
            echo "Create the folder at: obsidian-secondbrain/Portfolio/content/"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "Obsidian Sync Bot"
          git config user.email "sync@hakyun.com"
          git add content/
          if git diff --staged --quiet; then
            echo "No content changes — nothing to commit."
          else
            git commit -m "sync: update content from Obsidian vault"
            git push
          fi
